name: Black

on:
  push:
    branches:
      - main
    paths:
      - "**/*.py"

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Black
        run: pip install black

      - name: Run Black
        run: black . --line-length 80

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: ":art: Format Python code with Black"
          title: "Auto-format Python code with Black"
          body: |
            This PR was automatically generated by GitHub Actions.
            It formats the Python code using [Black](https://github.com/psf/black) with `line-length=80`.
          branch: black-fixes
          delete-branch: true
          base: main
          update: true
